<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Space Portal</title>
    <style>
        body {
            background-color: #0b0e14; /* Dark Space Background */
            color: #add8e6; /* Light Blue Text */
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            padding-top: 50px;
        }
        .container {
            border: 2px solid #007bff; /* Blue Border */
            padding: 20px;
            display: inline-block;
            border-radius: 15px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Orbit 🚀</h1>
        <p>Coder | Gamer | Space Enthusiast</p>
        <button onclick="changeFact()">Get a Space Fact!</button>
        <p id="fact"></p>
    </div>

    <script>
        function changeFact() {
            const facts = [
                "Neutron stars can spin 600 times per second.",
                "One day on Venus is longer than one year on Venus.",
                "There is a planet made of diamond.",
                "Space is completely silent."
            ];
            document.getElementById('fact').innerText = facts[Math.floor(Math.random() * facts.length)];
        }
    </script>
</body>
</html>
