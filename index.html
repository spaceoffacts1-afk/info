<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny | Professional Portfolio</title>
    <style>
        :root { 
            --accent-blue: #0056b3; 
            --bg-color: #f8f9fa; 
            --text-color: #333; 
        }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .card { 
            width: 90%; 
            max-width: 450px; 
            background: white; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            text-align: center; 
        }
        h1 { margin: 0 0 10px 0; color: var(--accent-blue); }
        p.bio-text { margin-bottom: 30px; line-height: 1.6; color: #555; }
        .links { display: flex; flex-direction: column; gap: 12px; }
        .btn { 
            padding: 12px 20px; 
            border: 2px solid var(--accent-blue); 
            color: var(--accent-blue); 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: 600; 
            transition: all 0.3s ease; 
        }
        .btn:hover { background: var(--accent-blue); color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Bunny</h1>
        <p class="bio-text">Software Developer | Gaming Enthusiast | Lifelong Learner</p>
        
        <div class="links">
            <a href="#" class="btn">My Projects</a>
            <a href="#" class="btn">Professional Blog</a>
            <a href="#" class="btn">GitHub</a>
            <a href="#" class="btn">Contact Me</a>
        </div>
    </div>
</body>
</html>
