<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny's Space Station</title>
    <style>
        body { margin: 0; background: #05070a; color: #e0f7fa; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: rgba(10, 25, 47, 0.9); padding: 20px; border-radius: 20px; border: 1px solid #00d4ff; width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #00d4ff; font-size: 1.5rem; margin-bottom: 0.5rem; }
        #game-area { width: 100%; height: 250px; position: relative; border: 2px dashed #00d4ff; margin: 20px 0; cursor: crosshair; background: rgba(0,0,0,0.3); }
        #meteor { width: 40px; height: 40px; background: #ff4500; border-radius: 50%; position: absolute; transition: 0.1s; cursor: pointer; }
        button { background: #00d4ff; border: none; padding: 10px 20px; border-radius: 30px; color: #05070a; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome, I'm Bunny! 🐰🚀</h1>
        <p>Coder | Gamer | Space Enthusiast</p>
        <p style="font-size: 0.9rem; color: #a0c4ff;">Exploring the universe, one line of code at a time.</p>
        
        <div id="game-area">
            <div id="meteor" onclick="hitMeteor()"></div>
        </div>
        <p>Score: <span id="score">0</span></p>
        <button onclick="resetGame()">Reset Score</button>
    </div>

    <script>
        let score = 0;
        const meteor = document.getElementById('meteor');
        const gameArea = document.getElementById('game-area');

        function hitMeteor() {
            score++;
            document.getElementById('score').innerText = score;
            moveMeteor();
        }

        function moveMeteor() {
            let x = Math.random() * (gameArea.clientWidth - 40);
            let y = Math.random() * (gameArea.clientHeight - 40);
            meteor.style.left = x + 'px';
            meteor.style.top = y + 'px';
        }

        function resetGame() {
            score = 0;
            document.getElementById('score').innerText = score;
        }
        
        moveMeteor(); 
    </script>
</body>
</html>
