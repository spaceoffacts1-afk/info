<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny's Space Station</title>
    <style>
        body { margin: 0; background: #05070a; color: #e0f7fa; font-family: sans-serif; text-align: center; overflow: hidden; }
        .card { background: rgba(10, 25, 47, 0.9); padding: 20px; border-radius: 20px; border: 1px solid #00d4ff; width: 300px; margin: 20px auto; }
        #game-area { width: 100%; height: 300px; position: relative; border: 2px dashed #00d4ff; margin-top: 10px; cursor: crosshair; }
        #meteor { width: 50px; height: 50px; background: #ff4500; border-radius: 50%; position: absolute; transition: 0.3s; cursor: pointer; }
        h1 { color: #00d4ff; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Bunny's Space Station 🐰🚀</h1>
        <p>Score: <span id="score">0</span></p>
        <div id="game-area">
            <div id="meteor" onclick="hitMeteor()"></div>
        </div>
        <button onclick="alert('Catch the meteor to score!')" style="margin-top:10px;">How to play</button>
    </div>

    <script>
        let score = 0;
        const meteor = document.getElementById('meteor');
        const gameArea = document.getElementById('game-area');

        function hitMeteor() {
            score++;
            document.getElementById('score').innerText = score;
            moveMeteor();
        }

        function moveMeteor() {
            let x = Math.random() * (gameArea.clientWidth - 50);
            let y = Math.random() * (gameArea.clientHeight - 50);
            meteor.style.left = x + 'px';
            meteor.style.top = y + 'px';
        }
        
        moveMeteor(); // Start position
    </script>
</body>
</html>
