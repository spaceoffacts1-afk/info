<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny's Space Station</title>
    <style>
        body {
            margin: 0;
            background-color: #05070a;
            color: #e0f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .card {
            background: rgba(10, 25, 47, 0.8);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            max-width: 80%;
            width: 400px;
        }
        h1 { color: #00d4ff; margin-bottom: 0.5rem; }
        p { line-height: 1.6; }
        button {
            background: #00d4ff;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            color: #05070a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        #fact { margin-top: 20px; font-style: italic; color: #a0c4ff; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome, I'm Bunny! 🐰🚀</h1>
        <p>Coder | Gamer | Space Enthusiast</p>
        <p>Exploring the universe, one line of code at a time.</p>
        <button onclick="showFact()">Discover Space Fact</button>
        <p id="fact"></p>
    </div>

    <script>
        function showFact() {
            const spaceFacts = [
                "Space is completely silent because there is no atmosphere.",
                "The Sun accounts for 99.86% of the mass in our solar system.",
                "One day on Venus is longer than one year on Venus.",
                "There is a planet made of diamond that is twice the size of Earth.",
                "Neutron stars can spin 600 times per second.",
                "Footprints on the Moon will be there for 100 million years."
            ];
            const randomIndex = Math.floor(Math.random() * spaceFacts.length);
            document.getElementById('fact').innerText = spaceFacts[randomIndex];
        }
    </script>
</body>
</html>
