<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny | Creative Portfolio</title>
    <style>
        :root { --blue: #2A5C82; }
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #FFFFFF; 
            color: #333;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .container { text-align: center; max-width: 400px; padding: 20px; }
        h1 { font-size: 2.5rem; letter-spacing: -1px; color: var(--blue); margin-bottom: 10px; }
        p.tagline { font-size: 1.1rem; color: #666; margin-bottom: 40px; }
        .divider { width: 50px; height: 2px; background: var(--blue); margin: 0 auto 40px; }
        .bio-info { line-height: 1.8; font-size: 1rem; color: #444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bunny</h1>
        <p class="tagline">Creative Designer & Learner</p>
        <div class="divider"></div>
        <div class="bio-info">
            <p>Exploring the intersection of aesthetic design and digital technology.</p>
            <p>Passionate about visual storytelling, gaming aesthetics, and the pursuit of new skills.</p>
        </div>
    </div>
</body>
</html>
